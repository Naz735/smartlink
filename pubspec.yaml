name: smartlink
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  tflite_flutter: ^0.11.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  share_plus: ^13.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model/phishing_model.tflite
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/smartlink_splash.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#FFFFFF"
    image: assets/images/smartlink_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/smartlink_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/smartlink_logo.png"